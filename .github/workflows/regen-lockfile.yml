name: regen-lockfile

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  regen:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Enable corepack + activate pnpm
        run: |
          corepack enable
          corepack prepare pnpm@11.0.8 --activate
          pnpm --version

      - name: Patch pnpm-workspace.yaml for fork
        run: |
          sed -i 's/^minimumReleaseAge:.*$/minimumReleaseAge: 0/' pnpm-workspace.yaml
          sed -i '/^patchedDependencies:/,$d' pnpm-workspace.yaml
          # Allow git-resolved deps (libsignal is fetched from github by baileys)
          if ! grep -q '^blockExoticSubdeps' pnpm-workspace.yaml; then
            echo '' >> pnpm-workspace.yaml
            echo 'blockExoticSubdeps: false' >> pnpm-workspace.yaml
          fi
          echo '--- Patched workspace tail ---'
          tail -30 pnpm-workspace.yaml

      - name: Generate pnpm-lock.yaml
        run: |
          export NODE_OPTIONS=--max-old-space-size=4096
          pnpm install --no-frozen-lockfile --ignore-scripts

      - name: Commit lockfile + workspace
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add pnpm-workspace.yaml pnpm-lock.yaml
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: regen pnpm-lock with fork patches (minimumReleaseAge=0, no patchedDeps, blockExoticSubdeps=false)"
            git push
          fi
