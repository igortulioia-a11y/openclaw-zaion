name: zaion-build

on:
  push:
    branches: [main]
    paths:
      - 'extensions/zaion-**'
      - '.github/workflows/zaion-build.yml'
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Patch build config for fork (CI-only, repo files untouched in commit)
        run: |
          # 1. Allow lockfile regeneration for new workspace package
          cp Dockerfile Dockerfile.zaion
          sed -i 's/--frozen-lockfile/--no-frozen-lockfile/g' Dockerfile.zaion

          # 2. Drop minimumReleaseAge gate (we accept whatever pnpm resolves)
          sed -i 's/^minimumReleaseAge:.*$/minimumReleaseAge: 0/' pnpm-workspace.yaml

          # 3. Drop patchedDependencies section (causes ERR_PNPM_UNUSED_PATCH on regen)
          # The 'patchedDependencies:' key block is at top of yaml; delete the key + indented block
          python3 <<'PYEOF'
          import re
          src = open('pnpm-workspace.yaml').read()
          # Match 'patchedDependencies:' line + following indented lines
          out_lines = []
          skip = False
          for line in src.splitlines():
              stripped = line.lstrip()
              if line.startswith('patchedDependencies:'):
                  skip = True
                  continue
              if skip:
                  # If line is indented (continuation), skip; else stop skipping
                  if line.startswith('  ') or line.strip() == '':
                      if line.strip() == '':
                          # blank line may belong to block or separate; keep if next line not indented
                          continue
                      continue
                  else:
                      skip = False
              out_lines.append(line)
          open('pnpm-workspace.yaml','w').write('
'.join(out_lines) + '
')
          PYEOF

          echo '--- Verifying patches ---'
          grep -nE 'no-frozen-lockfile' Dockerfile.zaion | head -3
          grep -nE '^minimumReleaseAge' pnpm-workspace.yaml || echo '(no minimumReleaseAge line)'
          echo 'patchedDependencies section gone?'
          grep -c 'patchedDependencies' pnpm-workspace.yaml || true

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Short SHA
        id: sha
        run: echo "short=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.zaion
          push: true
          build-args: |
            OPENCLAW_EXTENSIONS=zaion-todowrite
          tags: |
            ghcr.io/${{ github.repository_owner }}/openclaw-zaion:latest
            ghcr.io/${{ github.repository_owner }}/openclaw-zaion:sha-${{ steps.sha.outputs.short }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
