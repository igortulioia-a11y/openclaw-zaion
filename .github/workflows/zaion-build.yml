name: zaion-build

on:
  push:
    branches: [main]
    paths:
      - 'extensions/zaion-**'
      - '.github/workflows/zaion-build.yml'
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Patch build files for fork (no-frozen-lockfile + minimumReleaseAge=0)
        run: |
          cp Dockerfile Dockerfile.zaion
          sed -i 's/--frozen-lockfile/--no-frozen-lockfile/g' Dockerfile.zaion
          sed -i 's/^minimumReleaseAge:.*$/minimumReleaseAge: 0/' pnpm-workspace.yaml
          echo "--- Dockerfile.zaion patches ---"
          grep -n 'no-frozen-lockfile' Dockerfile.zaion | head -5
          echo "--- pnpm-workspace.yaml minimumReleaseAge ---"
          grep -n 'minimumReleaseAge' pnpm-workspace.yaml | head -3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Short SHA
        id: sha
        run: echo "short=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.zaion
          push: true
          build-args: |
            OPENCLAW_EXTENSIONS=zaion-todowrite
          tags: |
            ghcr.io/${{ github.repository_owner }}/openclaw-zaion:latest
            ghcr.io/${{ github.repository_owner }}/openclaw-zaion:sha-${{ steps.sha.outputs.short }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
