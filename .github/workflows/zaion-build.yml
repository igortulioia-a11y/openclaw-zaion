name: zaion-build

on:
  push:
    branches: [main]
    paths:
      - 'src/zaionext/**'
      - 'extensions/zaion-**'
      - 'Dockerfile'
      - '.github/workflows/zaion-build.yml'
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Short SHA
        id: sha
        run: echo "short=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          build-args: |
            OPENCLAW_EXTENSIONS=zaion-todowrite
          tags: |
            ghcr.io/${{ github.repository_owner }}/openclaw-zaion:latest
            ghcr.io/${{ github.repository_owner }}/openclaw-zaion:sha-${{ steps.sha.outputs.short }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
