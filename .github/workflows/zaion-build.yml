name: zaion-build

on:
  push:
    branches: [main]
    paths:
      - 'extensions/zaion-**'
      - '.github/workflows/zaion-build.yml'
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Patch build config for fork
        run: |
          # Allow lockfile updates for our extension workspace addition
          cp Dockerfile Dockerfile.zaion
          sed -i 's/--frozen-lockfile/--no-frozen-lockfile/g' Dockerfile.zaion
          # Disable minimum release age (we install whatever pnpm resolves)
          sed -i 's/^minimumReleaseAge:.*$/minimumReleaseAge: 0/' pnpm-workspace.yaml
          # Allow unused patchedDependencies (they target versions pnpm may not pin to)
          # pnpm 9+ reads strictPatchedDependencies at root level
          if ! grep -q '^strictPatchedDependencies' pnpm-workspace.yaml; then
            echo '' >> pnpm-workspace.yaml
            echo 'strictPatchedDependencies: false' >> pnpm-workspace.yaml
          fi
          echo '--- Verifying patches ---'
          grep -nE 'no-frozen-lockfile' Dockerfile.zaion | head -3
          grep -nE '^(minimumReleaseAge|strictPatchedDependencies)' pnpm-workspace.yaml

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Short SHA
        id: sha
        run: echo "short=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.zaion
          push: true
          build-args: |
            OPENCLAW_EXTENSIONS=zaion-todowrite
          tags: |
            ghcr.io/${{ github.repository_owner }}/openclaw-zaion:latest
            ghcr.io/${{ github.repository_owner }}/openclaw-zaion:sha-${{ steps.sha.outputs.short }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
